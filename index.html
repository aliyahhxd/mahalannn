<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Monthsary 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- floating hearts -->
  <div class="hearts"></div>

  <!-- MAIN CARD -->
  <div class="card" id="card">
    <h1>Happy Monthsary 💖</h1>

    <p class="question">Do you love me?</p>

    <img class="gif"
      src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif"
      alt="cute">

    <img class="spongebob"
      src="https://media.giphy.com/media/l1KueQWdcD1jlEUYE/giphy.gif"
      alt="spongebob">

    <div class="buttons">
      <button id="yesBtn">YES 💕</button>
      <button id="noBtn">NO 😭</button>
    </div>
  </div>

  <!-- LOVE SCREEN -->
  <div class="love-screen" id="loveScreen">
    <h1>YAY!! 💖</h1>
    <p>I knew it 🥺 I love you sooo much 💞</p>

    <img class="couple" src="mahalankes.png" alt="us">
  </div>

  <script src="script.js"></script>
</body>
</html>
