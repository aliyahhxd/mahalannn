<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Monthsary 💖</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="mahalankes.mp3" type="audio/mpeg">
</audio>

<!-- HEART CONTAINER -->
<div id="hearts-container"></div>

<!-- MAIN SCREEN -->
<div class="screen">
  <div class="card" id="card">
    <h1>Happy Monthsary 💖</h1>
    <p>Do you love me?</p>

    <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" class="gif">

    <div class="buttons">
      <button id="yesBtn">YES 💕</button>
      <button id="noBtn">NO 😭</button>
    </div>
  </div>
</div>

<!-- LOVE SCREEN -->
<div class="love-screen" id="loveScreen">
  <h1>💖 I KNEW IT 💖</h1>
  <p>I love you sooo much 🥺💞</p>

  <img src="mahalankes.png" class="photo">
</div>

<script src="script.js"></script>
</body>
</html>
