<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Monthsary 💖</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hearts"></div>

  <!-- Main Card -->
  <div class="card" id="card">
    <h1>Happy Monthsary, Mahal! 💖</h1>

    <p class="question">Do you love me?</p>

    <!-- Cute GIF -->
    <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" class="gif">

    <!-- SpongeBob -->
    <img src="https://media.giphy.com/media/l1KueQWdcD1jlEUYE/giphy.gif" class="spongebob">

    <div class="buttons">
      <button id="yesBtn">YES 💕</button>
      <button id="noBtn">NO 😭</button>
    </div>
  </div>

  <div class="love-screen" id="loveScreen">
    <h1>I knew it!! 💞</h1>
    <p>I love you sooo much 🥺💗</p>

    <!-- Replace with your picture -->
    <img src="https://via.placeholder.com/300x300.png?text=OUR+PHOTO" class="couple">

  </div>

  <script src="script.js"></script>
</body>
</html>
